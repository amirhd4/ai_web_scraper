<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <title>Enterprise Scraper Architect</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@400;600;800&family=Vazirmatn:wght@400;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', 'Vazirmatn', sans-serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 p-6 transition-all duration-300">
    <div class="max-w-7xl mx-auto space-y-6">

        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center border-b border-slate-800 pb-5 gap-4">
            <div>
                <h1 id="ui-title" class="text-2xl font-black text-indigo-400 tracking-wider">⚡ CRAWL MASTER PRO</h1>
                <p id="ui-subtitle" class="text-slate-400 text-xs mt-1">Centralized Monitoring, AI Semantic Extraction & Distributed Cron Core</p>
            </div>
            <button onclick="toggleLanguage()" id="lang-btn" class="bg-indigo-600 hover:bg-indigo-500 text-white text-xs font-bold px-4 py-2 rounded-lg cursor-pointer transition">
                FA / پارسی
            </button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

            <div class="bg-slate-900 border border-slate-800 rounded-xl p-5 shadow-lg flex flex-col justify-between">
                <div>
                    <h2 id="ui-instant-title" class="text-sm font-bold text-emerald-400 mb-3">🚀 Instant Cluster Dispatch</h2>
                    <div class="space-y-3">
                        <div>
                            <label id="lbl-ins-urls" class="block text-[11px] text-slate-400 mb-1">Target URLs (One per line)</label>
                            <textarea id="ins-urls" class="w-full h-20 bg-slate-950 border border-slate-800 rounded p-2 text-xs mono outline-none focus:border-emerald-500" placeholder="https://example.com"></textarea>
                        </div>

                        <div>
                            <label id="lbl-ins-strategy" class="block text-[11px] text-slate-400 mb-1.5">Extraction Strategy</label>
                            <div class="grid grid-cols-2 gap-2 bg-slate-950 p-1 rounded-lg border border-slate-800">
                                <label class="flex items-center justify-center gap-1.5 py-1.5 rounded-md text-xs font-bold cursor-pointer transition select-none bg-slate-900 text-white border border-slate-700" id="label-ins-mode-css">
                                    <input type="radio" name="ins-mode" value="css" checked class="hidden" onchange="toggleExtractionFields('ins', 'css')">
                                    <span>CSS Selectors</span>
                                </label>
                                <label class="flex items-center justify-center gap-1.5 py-1.5 rounded-md text-xs font-bold cursor-pointer transition select-none text-slate-400 hover:text-slate-200" id="label-ins-mode-ai">
                                    <input type="radio" name="ins-mode" value="ai" class="hidden" onchange="toggleExtractionFields('ins', 'ai')">
                                    <span>✨ AI Assistant</span>
                                </label>
                            </div>
                        </div>

                        <div id="ins-wrapper-css" class="space-y-1">
                            <label id="lbl-ins-selectors" class="block text-[11px] text-slate-400">CSS Selectors (Comma-separated)</label>
                            <input id="ins-selectors" type="text" class="w-full bg-slate-950 border border-slate-800 rounded p-2 text-xs mono outline-none focus:border-emerald-500" value="title, h1">
                        </div>

                        <div id="ins-wrapper-ai" class="space-y-1 hidden">
                            <label id="lbl-ins-prompt" class="block text-[11px] text-purple-400 font-bold">Describe what data you want (Natural Language)</label>
                            <textarea id="ins-ai-prompt" class="w-full h-16 bg-slate-950 border border-purple-900/40 rounded p-2 text-xs outline-none focus:border-purple-500 text-purple-200" placeholder="e.g., Extract product titles and their prices."></textarea>
                        </div>

                        <div class="flex items-center gap-2 py-1">
                            <input type="checkbox" id="ins-ignore" class="w-4 h-4 accent-emerald-500 cursor-pointer">
                            <label id="lbl-ins-ignore" for="ins-ignore" class="text-xs text-slate-300 cursor-pointer">Ignore history (Re-scrape visited)</label>
                        </div>
                    </div>
                </div>
                <button onclick="fireInstantJob()" id="btn-ins-submit" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-2 rounded text-xs transition mt-4 cursor-pointer">Execute Cluster Pack</button>
            </div>

            <div class="bg-slate-900 border border-slate-800 rounded-xl p-5 shadow-lg flex flex-col justify-between">
                <div>
                    <h2 id="ui-cron-title" class="text-sm font-bold text-sky-400 mb-3">⏳ Cron Automation Engine</h2>
                    <div class="space-y-3">
                        <div class="grid grid-cols-2 gap-2">
                            <div>
                                <label id="lbl-cron-expr" class="block text-[11px] text-slate-400 mb-1">Cron Expression</label>
                                <input id="cron-expr" type="text" class="w-full bg-slate-950 border border-slate-800 rounded p-2 text-xs mono outline-none focus:border-sky-500" value="*/5 * * * *">
                            </div>
                            <div>
                                <label id="lbl-cron-domain" class="block text-[11px] text-slate-400 mb-1">Scope Domain</label>
                                <input id="cron-domain" type="text" class="w-full bg-slate-950 border border-slate-800 rounded p-2 text-xs mono outline-none focus:border-sky-500" value="e-commerce">
                            </div>
                        </div>

                        <div>
                            <label id="lbl-cron-urls" class="block text-[11px] text-slate-400 mb-1">Target URLs</label>
                            <textarea id="cron-urls" class="w-full h-12 bg-slate-950 border border-slate-800 rounded p-2 text-xs mono outline-none focus:border-sky-500" placeholder="https://example.com/shop"></textarea>
                        </div>

                        <div>
                            <label id="lbl-cron-strategy" class="block text-[11px] text-slate-400 mb-1.5">Extraction Strategy</label>
                            <div class="grid grid-cols-2 gap-2 bg-slate-950 p-1 rounded-lg border border-slate-800">
                                <label class="flex items-center justify-center gap-1.5 py-1.5 rounded-md text-xs font-bold cursor-pointer transition select-none bg-slate-900 text-white border border-slate-700" id="label-cron-mode-css">
                                    <input type="radio" name="cron-mode" value="css" checked class="hidden" onchange="toggleExtractionFields('cron', 'css')">
                                    <span>CSS Selectors</span>
                                </label>
                                <label class="flex items-center justify-center gap-1.5 py-1.5 rounded-md text-xs font-bold cursor-pointer transition select-none text-slate-400 hover:text-slate-200" id="label-cron-mode-ai">
                                    <input type="radio" name="cron-mode" value="ai" class="hidden" onchange="toggleExtractionFields('cron', 'ai')">
                                    <span>✨ AI Assistant</span>
                                </label>
                            </div>
                        </div>

                        <div id="cron-wrapper-css" class="space-y-1">
                            <label id="lbl-cron-selectors" class="block text-[11px] text-slate-400">CSS Selectors</label>
                            <input id="cron-selectors" type="text" class="w-full bg-slate-950 border border-slate-800 rounded p-2 text-xs mono outline-none" value=".price, .title">
                        </div>

                        <div id="cron-wrapper-ai" class="space-y-1 hidden">
                            <label id="lbl-cron-prompt" class="block text-[11px] text-purple-400 font-bold">Describe what data you want (Natural Language)</label>
                            <textarea id="cron-ai-prompt" class="w-full h-12 bg-slate-950 border border-purple-900/40 rounded p-2 text-xs outline-none focus:border-purple-500 text-purple-200" placeholder="e.g., Extract all news titles and summary."></textarea>
                        </div>

                        <div class="flex items-center gap-2 py-1">
                            <input type="checkbox" id="cron-ignore" class="w-4 h-4 accent-sky-500 cursor-pointer">
                            <label id="lbl-cron-ignore" for="cron-ignore" class="text-xs text-slate-300 cursor-pointer">Ignore history</label>
                        </div>
                    </div>
                </div>
                <button onclick="registerCronJob()" id="btn-cron-submit" class="w-full bg-sky-600 hover:bg-sky-500 text-white font-bold py-2 rounded text-xs transition mt-4 cursor-pointer">Deploy Scheduled System</button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

            <div class="bg-slate-900 border border-slate-800 rounded-xl p-5 shadow-lg lg:col-span-1">
                <h2 id="ui-active-cron-title" class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">⛓️ Active Cron Registry</h2>
                <div id="cron-list-box" class="space-y-2 max-h-[420px] overflow-y-auto pr-1">
                    </div>
            </div>

            <div class="bg-slate-900 border border-slate-800 rounded-xl p-5 shadow-lg lg:col-span-2">
                <div class="flex justify-between items-center mb-4">
                    <h2 id="ui-live-feed-title" class="text-xs font-bold text-slate-400 uppercase tracking-widest">📺 Live Transaction Feed</h2>
                    <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                </div>
                <div id="terminal-feed" class="bg-slate-950 border border-slate-800 rounded-lg p-4 h-96 overflow-y-auto text-xs mono space-y-3">
                    <div class="text-slate-600">&gt;_ Waiting for cluster telemetry stream...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentLang = 'en';

        const i18n = {
            en: {
                title: "⚡ CRAWL MASTER PRO",
                subtitle: "Centralized Monitoring, AI Semantic Extraction & Distributed Cron Core",
                instantTitle: "🚀 Instant Cluster Dispatch",
                cronTitle: "⏳ Cron Automation Engine",
                activeCronTitle: "⛓️ Active Cron Registry",
                liveFeedTitle: "📺 Live Transaction Feed",
                lblUrls: "Target URLs (One per line)",
                lblStrategy: "Extraction Strategy",
                lblSelectors: "CSS Selectors (Comma-separated)",
                lblPrompt: "Describe what data you want (Natural Language)",
                lblIgnore: "Ignore history (Re-scrape visited)",
                lblCronExpr: "Cron Expression",
                lblScope: "Scope Domain",
                btnInstant: "Execute Cluster Pack",
                btnCron: "Deploy Scheduled System",
                btnLang: "FA / پارسی",
                msgEmptyUrls: "Please insert at least one target URL Node.",
                msgSuccessInstant: "Instant cluster batch successfully pushed to queue nodes.",
                msgSuccessCron: "Scheduled cron pattern integrated successfully.",
                modeBypass: "Bypass Cache",
                modeFilter: "History Filtered"
            },
            fa: {
                title: "⚡ کراول مستر پرو",
                subtitle: "مانیتورینگ متمرکز، استخراج معنایی با هوش مصنوعی و هسته توزیع‌شده زمان‌بندی",
                instantTitle: "🚀 ارسال آنی خوشه‌ای",
                cronTitle: "⏳ موتور اتوماسیون زمان‌بندی (Cron)",
                activeCronTitle: "⛓️ ثبت کرون‌های فعال",
                liveFeedTitle: "📺 فید زنده عملیات",
                lblUrls: "آدرس‌های هدف (هر خط یک آدرس)",
                lblStrategy: "استراتژی استخراج داده",
                lblSelectors: "انتخاب‌گرهای CSS (جدا شده با کاما)",
                lblPrompt: "دیتای درخواستی را به زبان عامیانه توصیف کنید",
                lblIgnore: "نادیده گرفتن سوابق (اسکرپ مجدد دیتای تکراری)",
                lblCronExpr: "بیان زمان‌بندی (Cron Expression)",
                lblScope: "دامنه/محدوده پروژه",
                btnInstant: "اجرای بسته خوشه‌ای آنی",
                btnCron: "دیپلوی سیستم زمان‌بندی",
                btnLang: "EN / انگلیسی",
                msgEmptyUrls: "لطفاً حداقل یک آدرس هدف وارد کنید.",
                msgSuccessInstant: "دسته تسک آنی با موفقیت به گره‌های صف ارسال شد.",
                msgSuccessCron: "الگوی زمان‌بندی با موفقیت یکپارچه و فعال شد.",
                modeBypass: "بدون کش",
                modeFilter: "فیلتر تکراری"
            }
        };

        function toggleLanguage() {
            currentLang = currentLang === 'en' ? 'fa' : 'en';
            document.documentElement.dir = currentLang === 'fa' ? 'rtl' : 'ltr';
            document.documentElement.lang = currentLang;

            // اعمال ترجمه‌ها در DOM
            document.getElementById("ui-title").innerText = i18n[currentLang].title;
            document.getElementById("ui-subtitle").innerText = i18n[currentLang].subtitle;
            document.getElementById("ui-instant-title").innerText = i18n[currentLang].instantTitle;
            document.getElementById("ui-cron-title").innerText = i18n[currentLang].cronTitle;
            document.getElementById("ui-active-cron-title").innerText = i18n[currentLang].activeCronTitle;
            document.getElementById("ui-live-feed-title").innerText = i18n[currentLang].liveFeedTitle;

            document.getElementById("lbl-ins-urls").innerText = i18n[currentLang].lblUrls;
            document.getElementById("lbl-ins-strategy").innerText = i18n[currentLang].lblStrategy;
            document.getElementById("lbl-ins-selectors").innerText = i18n[currentLang].lblSelectors;
            document.getElementById("lbl-ins-prompt").innerText = i18n[currentLang].lblPrompt;
            document.getElementById("lbl-ins-ignore").innerText = i18n[currentLang].lblIgnore;

            document.getElementById("lbl-cron-expr").innerText = i18n[currentLang].lblCronExpr;
            document.getElementById("lbl-cron-domain").innerText = i18n[currentLang].lblScope;
            document.getElementById("lbl-cron-urls").innerText = i18n[currentLang].lblUrls;
            document.getElementById("lbl-cron-strategy").innerText = i18n[currentLang].lblStrategy;
            document.getElementById("lbl-cron-selectors").innerText = i18n[currentLang].lblSelectors;
            document.getElementById("lbl-cron-prompt").innerText = i18n[currentLang].lblPrompt;
            document.getElementById("lbl-cron-ignore").innerText = i18n[currentLang].lblIgnore;

            document.getElementById("btn-ins-submit").innerText = i18n[currentLang].btnInstant;
            document.getElementById("btn-cron-submit").innerText = i18n[currentLang].btnCron;
            document.getElementById("lang-btn").innerText = i18n[currentLang].btnLang;

            renderCronRegistry();
        }

        function toggleExtractionFields(panelPrefix, mode) {
            const cssWrapper = document.getElementById(`${panelPrefix}-wrapper-css`);
            const aiWrapper = document.getElementById(`${panelPrefix}-wrapper-ai`);
            const cssLabel = document.getElementById(`label-${panelPrefix}-mode-css`);
            const aiLabel = document.getElementById(`label-${panelPrefix}-mode-ai`);

            if (mode === 'ai') {
                cssWrapper.classList.add('hidden');
                aiWrapper.classList.remove('hidden');
                aiLabel.className = "flex items-center justify-center gap-1.5 py-1.5 rounded-md text-xs font-bold cursor-pointer transition select-none bg-purple-900/40 text-purple-300 border border-purple-700/60 w-full";
                cssLabel.className = "flex items-center justify-center gap-1.5 py-1.5 rounded-md text-xs font-bold cursor-pointer transition select-none text-slate-400 hover:text-slate-200 w-full";
            } else {
                cssWrapper.classList.remove('hidden');
                aiWrapper.classList.add('hidden');
                cssLabel.className = "flex items-center justify-center gap-1.5 py-1.5 rounded-md text-xs font-bold cursor-pointer transition select-none bg-slate-900 text-white border border-slate-700 w-full";
                aiLabel.className = "flex items-center justify-center gap-1.5 py-1.5 rounded-md text-xs font-bold cursor-pointer transition select-none text-slate-400 hover:text-slate-200 w-full";
            }
        }

        // WEBSOCKET TELEMETRY
        const ws = new WebSocket(`ws://${window.location.host}/ws/monitor`);
        const terminal = document.getElementById("terminal-feed");

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            if (data.event === "page_scraped") {
                const logNode = document.createElement("div");
                logNode.className = "p-3 rounded bg-slate-900 border-l-2 border-indigo-500 space-y-1 animation-fade";

                const badgeColor = data.status_code === 200 ? 'text-emerald-400' : 'text-rose-400';
                const sourceBadge = data.is_cron ? '[CRON CORE]' : '[INSTANT PACK]';

                logNode.innerHTML = `
                    <div class="flex justify-between text-[10px] text-slate-500">
                        <span>${sourceBadge} Task ID: ${data.task_id}</span>
                        <span class="${badgeColor}">HTTP ${data.status_code || 'ERR'}</span>
                    </div>
                    <div class="truncate text-sky-300 font-bold">${data.url}</div>
                    <pre class="text-[11px] text-slate-300 bg-slate-950 p-2 rounded border border-slate-800/60 overflow-x-auto">${JSON.stringify(data.data || data.error, null, 2)}</pre>
                `;
                terminal.insertBefore(logNode, terminal.firstChild);
            }
        };

        async function fireInstantJob() {
            const urls = document.getElementById("ins-urls").value.split("\n").filter(u => u.trim() !== "");
            const mode = document.querySelector('input[name="ins-mode"]:checked').value;
            const selectors = document.getElementById("ins-selectors").value.split(",").filter(s => s.trim() !== "");
            const ai_prompt = document.getElementById("ins-ai-prompt").value;
            const ignore_visited = document.getElementById("ins-ignore").checked;

            if(!urls.length) return alert(i18n[currentLang].msgEmptyUrls);

            const payload = {
                urls: urls,
                domain: "instant-runtime",
                ignore_visited: ignore_visited,
                extraction_mode: mode,
                css_selectors: mode === 'css' ? selectors : [],
                ai_prompt: mode === 'ai' ? ai_prompt : null
            };

            const response = await fetch('/api/v1/scrape/batch', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            if(response.ok) {
                alert(i18n[currentLang].msgSuccessInstant);
                document.getElementById("ins-urls").value = "";
            }
        }

        async function registerCronJob() {
            const urls = document.getElementById("cron-urls").value.split("\n").filter(u => u.trim() !== "");
            const cron_expression = document.getElementById("cron-expr").value;
            const domain = document.getElementById("cron-domain").value;
            const mode = document.querySelector('input[name="cron-mode"]:checked').value;
            const selectors = document.getElementById("cron-selectors").value.split(",").filter(s => s.trim() !== "");
            const ai_prompt = document.getElementById("cron-ai-prompt").value;
            const ignore_visited = document.getElementById("cron-ignore").checked;

            if(!urls.length) return alert(i18n[currentLang].msgEmptyUrls);

            const payload = {
                urls: urls,
                domain: domain,
                cron_expression: cron_expression,
                ignore_visited: ignore_visited,
                extraction_mode: mode,
                css_selectors: mode === 'css' ? selectors : [],
                ai_prompt: mode === 'ai' ? ai_prompt : null
            };

            const response = await fetch('/api/v1/cron', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            if(response.ok) {
                alert(i18n[currentLang].msgSuccessCron);
                renderCronRegistry();
            } else {
                const err = await response.json();
                alert(`Error: ${err.detail}`);
            }
        }

        let cachedCronJobs = {};
        async function renderCronRegistry() {
            const response = await fetch('/api/v1/cron');
            const box = document.getElementById("cron-list-box");
            box.innerHTML = "";
            if(response.ok) {
                cachedCronJobs = await response.json();
                for (const [id, job] of Object.entries(cachedCronJobs)) {
                    const item = document.createElement("div");
                    item.className = "flex justify-between items-center bg-slate-950 p-3 border border-slate-800 rounded-lg text-xs gap-4";
                    const modeText = job.ignore_visited ? i18n[currentLang].modeBypass : i18n[currentLang].modeFilter;

                    // مدیریت نمایش فیلد بر بر اساس این که جاب فعال از نوع هوش مصنوعی است یا CSS
                    const strategyDetails = job.extraction_mode === 'ai'
                        ? `✨ AI: "${job.ai_prompt}"`
                        : `⚙️ CSS: ${job.css_selectors ? job.css_selectors.join(', ') : ''}`;

                    item.innerHTML = `
                        <div class="truncate max-w-[80%]">
                            <span class="text-sky-400 font-bold mono">${id}</span>
                            <span class="text-slate-500 mx-2 mono bg-slate-900 px-2 py-0.5 border border-slate-800 rounded">${job.cron_expression || job.cron}</span>
                            <span class="text-[10px] text-slate-400 px-1.5 rounded bg-slate-900 border border-slate-800 inline-block mt-1 sm:mt-0">${modeText}</span>
                            <div class="text-[10px] text-slate-400 mt-1 truncate">${strategyDetails} | Domains: ${job.domain}</div>
                        </div>
                        <button onclick="killCron('${id}')" class="text-rose-400 hover:text-rose-500 font-bold px-2 py-1 transition cursor-pointer shrink-0">✕</button>
                    `;
                    box.appendChild(item);
                }
            }
        }

        async function killCron(id) {
            await fetch(`/api/v1/cron/${id}`, { method: 'DELETE' });
            await renderCronRegistry();
        }

        // INITIAL BOOTSTRAP
        renderCronRegistry();
    </script>
</body>
</html>
